<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پرداخت موفق</title>
    {% load static %}
    <script src="{% static 'js/tailwind.js' %}"></script>
</head>
<body>
    <div class="p-4 mx-auto max-w-md text-center container">
        <div class="bg-green-50 border border-green-200 rounded-xl p-6 mt-10">
            <h1 class="text-xl font-bold text-green-600 mb-2">پرداخت موفق</h1>
            <p class="text-gray-600 mb-2">پرداخت شما با موفقیت انجام شد</p>

            {% if ref_id %}
                <p class="text-sm text-gray-500">
                    کد پیگیری: <span class="font-bold">{{ ref_id }}</span>
                </p>
            {% endif %}

            <a href="/" class="inline-block mt-6 px-6 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition">
                بازگشت به صفحه اصلی
            </a>
        </div> 
    </div>
</body>
</html>
